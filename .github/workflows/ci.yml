name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: python scripts/backlog.py check
      - run: python scripts/check.py
      - run: pytest --cov=simplicio_loop_quality --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=85
      - run: python -m build
